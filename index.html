<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установить Diamond AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #f0f0f0;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #252525;
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #3a3a3a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 16px;
        }
        .card h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #5a5a6e, #3a3a44);
            color: white;
        }
        .btn:hover {
            background: linear-gradient(135deg, #6a6a7e, #4a4a54);
            transform: translateY(-2px);
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #5a5a5a;
        }
        .note a {
            color: #b0b0b0;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="Diamond AI">
        <h1>Diamond AI</h1>
        <p>Нажмите кнопку ниже, чтобы установить значок приложения на рабочий стол iPhone.</p>
        
        <a href="diamond-ai.mobileconfig" class="btn">
            <i class="fas fa-download"></i> Установить приложение (iPhone)
        </a>
        
        <p class="note">
            После скачивания откройте <strong>Настройки &gt; Профиль загружен</strong> и нажмите «Установить».<br>
            <a href="https://diam-ai.ru" target="_blank">Перейти на сайт</a>
        </p>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</body>
</html>
